<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sovereign RenderBox™</title>

<style>
  :root {
    --bg: #f7f3ea;
    --card: #ffffff;
    --ink: #1b1610;
    --accent: #6b3fa0;
    --gold: #d9b878;
    --radius: 14px;
  }

  body {
    margin:0;
    padding:30px;
    background: var(--bg);
    font-family: "Cormorant Garamond", serif;
    color: var(--ink);
    display:flex;
    justify-content:center;
  }

  .render-box {
    width: 100%;
    max-width: 620px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 24px 32px;
    border: 1px solid rgba(0,0,0,0.06);
  }

  .title {
    font-family: "Cinzel", serif;
    font-size: 32px;
    text-align:center;
    margin-bottom: 14px;
    color: var(--accent);
  }

  .subtitle {
    text-align:center;
    font-size: 16px;
    opacity: 0.75;
    margin-bottom: 24px;
  }

  textarea {
    width:100%;
    min-height:120px;
    border-radius: var(--radius);
    padding:14px;
    border: 1px solid rgba(0,0,0,0.15);
    font-family:"Cormorant Garamond",serif;
    font-size:18px;
    outline:none;
  }

  button {
    background: var(--gold);
    color:#2e2515;
    padding:12px 20px;
    font-family:"Cinzel",serif;
    border-radius: var(--radius);
    border:none;
    cursor:pointer;
    font-size:17px;
    margin-top:16px;
    width:100%;
    transition:0.2s;
  }
  button:hover {
    background:#e0c58c;
  }

  .preview {
    margin-top:24px;
    text-align:center;
  }

  .preview img {
    max-width:100%;
    border-radius: var(--radius);
    box-shadow:0 6px 18px rgba(0,0,0,0.2);
    display:none;
  }

  .loading {
    text-align:center;
    margin-top:18px;
    font-size:18px;
    color:var(--accent);
    display:none;
  }
</style>
</head>

<body>
<div class="render-box">
  <div class="title">Sovereign RenderBox™</div>
  <div class="subtitle">Describe an image → Render it into view</div>

  <textarea id="prompt" placeholder="Describe your scene… (e.g. “pastel valley with golden trails of light…”)"></textarea>

  <button id="generateBtn">✨ Render Image</button>

  <div class="loading" id="loading">Rendering… please wait…</div>

  <div class="preview">
    <img id="resultImage" alt="Rendered Image">
  </div>
</div>

<script>
/* ============================================================
   Sovereign RenderBox — Vanilla JS Rendering Widget
   (Frontend only — plug in your own backend render API below)
   ============================================================ */

document.getElementById('generateBtn').addEventListener('click', async () => {
  
  const prompt = document.getElementById('prompt').value.trim();
  const loadingEl = document.getElementById('loading');
  const imgEl = document.getElementById('resultImage');

  if (!prompt) {
    alert("Please enter a description first.");
    return;
  }

  loadingEl.style.display = "block";
  imgEl.style.display = "none";

  try {
    /* 
       ⬇️ CONNECT YOUR RENDER ENDPOINT HERE
       Replace this URL with your real generator.
       For now it uses a placeholder that returns a random image.
    */

    // Example placeholder (replace with your API)
    const response = await fetch("https://source.unsplash.com/900x600/?" + encodeURIComponent(prompt));

    // If using your own API, you would instead:
    // const response = await fetch(YOUR_BACKEND_URL, {method:"POST",body:JSON.stringify({prompt})});
    // const data = await response.json();
    // imgEl.src = data.image_url;

    imgEl.src = response.url; // For the placeholder

    imgEl.onload = () => {
      loadingEl.style.display = "none";
      imgEl.style.display = "block";
    };

  } catch (e) {
    loadingEl.innerText = "Error generating image.";
  }
});
</script>

</body>
</html>
